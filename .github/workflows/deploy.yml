name: Build & Deploy Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (fails CI on lint errors — R10.4)
        run: pnpm lint

      - name: Typecheck (Phase 3 Wave 0 gate)
        run: pnpm typecheck

      - name: Unit tests (Phase 3 Wave 0 gate)
        run: pnpm test:unit

      # HEX→HSL converter spec is a LOCAL-ONLY check — requires
      # project/colors_and_type.css from the sibling design-system repo,
      # which is intentionally not vendored here. Run locally before PR:
      #   pnpm exec node scripts/hex-to-hsl.spec.mjs

      - name: Dogfood drift check (globals.css == theme.css)
        run: pnpm drift:check

      - name: Build shadcn registry → public/r/*.json
        run: pnpm dlx shadcn@latest build

      - name: Build Next.js static site → out/
        run: pnpm exec next build

      # Safety net: ensure /r/ is in the shipped artifact (Pitfall #5 belt-and-braces).
      - name: Copy registry JSON into export
        run: |
          mkdir -p out/r
          cp -r public/r/* out/r/ 2>/dev/null || true

      - name: Disable Jekyll
        run: touch out/.nojekyll

      # Phase 3 D-16: axe gate runs against the freshly-built static
      # export before we ship it. `test:a11y` greps for the `a11y` tag
      # in spec titles; Wave 0 has no tagged specs so the step passes
      # vacuously. Plans 3-01..3-14 add per-primitive a11y checks that
      # this step will enforce automatically.
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: a11y tests (axe + playwright — D-16)
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3030
        run: pnpm test:a11y

      - name: Start registry server for smoke (:3000)
        run: |
          nohup npx --yes serve out -l 3000 > /tmp/serve.log 2>&1 &
          echo $! > /tmp/serve.pid

      - name: Consumer smoke — all 14 primitives (3-17, R5.1)
        env:
          SMOKE_WITH_PRIMITIVES: '1'
        run: pnpm smoke:consumer

      - name: Stop registry server
        if: always()
        run: kill $(cat /tmp/serve.pid) 2>/dev/null || true

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
